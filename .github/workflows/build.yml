name: Build, Test & Release

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-maven-

    - name: Compile
      run: mvn compile -DskipTests

    - name: SpotBugs static analysis
      run: mvn spotbugs:check -DskipTests

    - name: OWASP Dependency Check
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      run: mvn dependency-check:check -DskipTests

    - name: Run tests with JaCoCo coverage
      run: mvn verify -DskipBenchmarks

    - name: Upload JaCoCo coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jacoco-report
        path: target/site/jacoco/

    - name: Generate Javadoc
      run: mvn javadoc:javadoc -DskipTests

    - name: Upload Javadoc
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: javadoc
        path: target/site/apidocs/

    - name: Upload SpotBugs report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: spotbugs-report
        path: target/spotbugs/

    - name: Upload OWASP report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: owasp-report
        path: target/dependency-check-report.*

    - name: Package fat JAR
      run: mvn package -DskipTests -DskipBenchmarks -Dskip.spotbugs -Dskip.dependencyCheck

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: gestionmorgue-jar
        path: target/gestionmorgue-*.jar

  package-exe:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Download built JAR
      uses: actions/download-artifact@v4
      with:
        name: gestionmorgue-jar
        path: release/

    - name: Install WiX Toolset
      run: choco install wixtoolset --no-progress -y

    - name: Create EXE with jpackage
      shell: pwsh
      run: |
        $VERSION = "$env:GITHUB_REF" -replace 'refs/tags/v', ''
        $JAR = Get-ChildItem -Path release/gestionmorgue-*.jar | Select-Object -First 1
        jpackage --input release `
          --name "GestionMorgue" `
          --main-jar $JAR.Name `
          --main-class com.gestionmorgue.App `
          --type exe `
          --java-options "-Xmx512m" `
          --vendor "Gestion Morgue" `
          --description "Application de gestion de morgue" `
          --app-version $VERSION `
          --win-dir-chooser `
          --dest dist

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: gestionmorgue-exe
        path: dist/*.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, package-exe]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download built JAR
      uses: actions/download-artifact@v4
      with:
        name: gestionmorgue-jar
        path: release/

    - name: Download EXE
      uses: actions/download-artifact@v4
      with:
        name: gestionmorgue-exe
        path: release/

    - name: Extract version and checksum
      shell: bash
      run: |
        VERSION="${GITHUB_REF#refs/tags/v}"
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        JAR_FILE=$(ls release/gestionmorgue-*.jar | head -1)
        CHECKSUM=$(sha256sum "$JAR_FILE" | cut -d' ' -f1)
        echo "CHECKSUM=$CHECKSUM" >> $GITHUB_ENV
        EXE_FILE=$(ls release/*.exe | head -1)
        EXE_CHECKSUM=$(sha256sum "$EXE_FILE" | cut -d' ' -f1)
        echo "EXE_CHECKSUM=$EXE_CHECKSUM" >> $GITHUB_ENV

    - name: Rename JAR with version tag
      shell: bash
      run: |
        mv release/gestionmorgue-*.jar "release/gestionmorgue-${{ env.VERSION }}.jar"
        echo "JAR_FILE=release/gestionmorgue-${{ env.VERSION }}.jar" >> $GITHUB_ENV

    - name: Generate version.json
      shell: bash
      run: |
        cat > release/version.json << JSONEOF
        {
          "version": "${{ env.VERSION }}",
          "download_url": "https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION }}/gestionmorgue-${{ env.VERSION }}.jar",
          "checksum_sha256": "${{ env.CHECKSUM }}",
          "changelog": "https://github.com/${{ github.repository }}/releases/tag/v${{ env.VERSION }}",
          "release_date": "$(date -u +%Y-%m-%d)",
          "min_version": "1.0.0",
          "force_update": false
        }
        JSONEOF
        cat release/version.json

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release/gestionmorgue-${{ env.VERSION }}.jar
          release/version.json
          release/*.exe
        name: "Gestion Morgue v${{ env.VERSION }}"
        body: |
          ## Gestion Morgue v${{ env.VERSION }}

          ### Installateur Windows
          Téléchargez et exécutez `GestionMorgue-${{ env.VERSION }}.exe`

          ### JAR portable
          1. Téléchargez `gestionmorgue-${{ env.VERSION }}.jar`
          2. Lancez : `java -jar gestionmorgue-${{ env.VERSION }}.jar`

          ### Checksums
          - JAR SHA-256 : `${{ env.CHECKSUM }}`
          - EXE SHA-256 : `${{ env.EXE_CHECKSUM }}`

  deploy-pages:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/checkout@v4

    - name: Download version.json
      uses: actions/download-artifact@v4
      with:
        name: version-json
        path: pages/

    - name: Download Javadoc
      uses: actions/download-artifact@v4
      with:
        name: javadoc
        path: pages/javadoc/

    - name: Copy web resources and user manual
      shell: bash
      run: |
        cp -r src/main/resources/web/* pages/
        cp docs/user-manual.md pages/
        ls -la pages/

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: pages/

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
