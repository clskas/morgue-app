openapi: "3.0.0"
info:
  title: Gestion Morgue REST API
  version: "1.0.0"
  description: API REST pour l'application Gestion Morgue

servers:
  - url: http://localhost:8080/api
    description: Serveur local de développement

paths:
  /auth:
    post:
      operationId: authenticateUser
      summary: Authentifier un utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
                - username
                - password
      responses:
        "200":
          description: Authentification réussie
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  username:
                    type: string
                  role:
                    type: string
                  fullName:
                    type: string
        "400":
          description: Requête invalide
          content:
            application/json:
              schema:
                type: object
              example:
                error: "username et password requis"
        "401":
          description: Identifiants invalides
          content:
            application/json:
              schema:
                type: object
              example:
                error: "Identifiants invalides"

  /health:
    get:
      operationId: healthCheck
      summary: Vérifier l'état du service
      responses:
        "200":
          description: Service en bonne santé
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  app:
                    type: string
                  version:
                    type: string
                  timestamp:
                    type: string
                    format: date-time

  /deceased:
    get:
      operationId: listDeceased
      summary: Lister les défunts
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Terme de recherche optionnel
      responses:
        "200":
          description: Liste des défunts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deceased"
    post:
      operationId: createDeceased
      summary: Créer un défunt
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lastName:
                  type: string
                firstName:
                  type: string
                gender:
                  type: string
                  enum:
                    - MASCULIN
                    - FEMININ
                    - NON_SPÉCIFIÉ
                birthDate:
                  type: string
                  format: date
                deathDate:
                  type: string
                  format: date
                placeOfDeath:
                  type: string
      responses:
        "201":
          description: Défunt créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deceased"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                type: object
              example:
                error: "Token manquant ou invalide"

  /deceased/{id}:
    get:
      operationId: getDeceasedById
      summary: Obtenir un défunt par son ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Défunt trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deceased"
        "404":
          description: Défunt non trouvé
          content:
            application/json:
              schema:
                type: object
              example:
                error: "Défunt non trouvé"
    put:
      operationId: updateDeceased
      summary: Mettre à jour un défunt
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lastName:
                  type: string
                firstName:
                  type: string
                gender:
                  type: string
                  enum:
                    - MASCULIN
                    - FEMININ
                    - NON_SPÉCIFIÉ
                birthDate:
                  type: string
                  format: date
                deathDate:
                  type: string
                  format: date
                placeOfDeath:
                  type: string
      responses:
        "200":
          description: Défunt mis à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deceased"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                type: object
              example:
                error: "Token manquant ou invalide"
        "404":
          description: Défunt non trouvé
          content:
            application/json:
              schema:
                type: object
              example:
                error: "Défunt non trouvé"
    delete:
      operationId: deleteDeceased
      summary: Supprimer un défunt
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Défunt supprimé
          content:
            application/json:
              schema:
                type: object
              example:
                message: "Supprimé"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                type: object
              example:
                error: "Token manquant ou invalide"
        "404":
          description: Défunt non trouvé
          content:
            application/json:
              schema:
                type: object
              example:
                error: "Défunt non trouvé"

  /storage:
    get:
      operationId: listStorageLocations
      summary: Lister les emplacements de stockage
      responses:
        "200":
          description: Liste des emplacements de stockage
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StorageLocation"

  /interventions:
    get:
      operationId: listPendingInterventions
      summary: Lister les interventions en attente
      responses:
        "200":
          description: Liste des interventions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Intervention"

  /metrics:
    get:
      operationId: getMetrics
      summary: Obtenir les métriques du serveur
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Métriques du serveur
          content:
            application/json:
              schema:
                type: object
                properties:
                  uptime:
                    type: number
                  totalRequests:
                    type: number
                  avgDurationMs:
                    type: number
                  endpoints:
                    type: object
                  statusCodes:
                    type: object
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                type: object
              example:
                error: "Token manquant ou invalide"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT-like
      description: Token d'authentification de type JWT-like

  schemas:
    Deceased:
      type: object
      properties:
        id:
          type: integer
          format: int64
        dossierNumber:
          type: string
        lastName:
          type: string
        firstName:
          type: string
        birthDate:
          type: string
          format: date
        deathDate:
          type: string
          format: date
        placeOfDeath:
          type: string
        causeOfDeath:
          type: string
        gender:
          type: string
        nir:
          type: string
        observations:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    StorageLocation:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        label:
          type: string
        zone:
          type: string
        temperature:
          type: integer
        occupied:
          type: boolean

    Intervention:
      type: object
      properties:
        id:
          type: integer
          format: int64
        deceased:
          type: object
          properties:
            id:
              type: integer
              format: int64
            fullName:
              type: string
        type:
          type: string
        description:
          type: string
        status:
          type: string
        scheduledAt:
          type: string
          format: date-time
        performedAt:
          type: string
          format: date-time
