version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gestionmorgue
      POSTGRES_USER: gestionmorgue
      POSTGRES_PASSWORD: gestionmorgue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/migrate-h2-to-pg.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestionmorgue -d gestionmorgue"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      PG_HOST: db
      PG_PORT: "5432"
      PG_DB: gestionmorgue
      PG_USER: gestionmorgue
      PG_PASSWORD: gestionmorgue
      JAVA_OPTS: "-Xmx512m -Dcom.sun.management.jmxremote"
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  pgdata:
